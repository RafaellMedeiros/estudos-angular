<section>
    <button class="favorito-btn" (click)="favorito = !favorito">
        <span>{{ favorito ? '\u2764' : '\u2661' }}</span>
    </button>
    <div class="image">
        <img [src]="image" [alt]="title">
    </div>

    <div class="info-livro">
        <h2 class="texto-h2">{{ title }}</h2>
        <h3 class="texto-h3">{{ subtitle }}</h3>
    </div>
</section>
